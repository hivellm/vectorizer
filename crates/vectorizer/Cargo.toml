[features]
default = ["hive-gpu", "fastembed", "transmutation", "simd", "simd-avx2", "simd-neon", "simd-wasm"]
fastembed = ["dep:fastembed"]

# SIMD master flag — turns the dispatch layer on. Disable to force the
# scalar backend everywhere (useful for debugging or for targets where
# the per-ISA features aren't wanted). When `simd` is OFF, every
# `crate::simd::*` call resolves to the scalar oracle.
#
# Each gate forwards to vectorizer-core (which owns the simd module
# under phase4_split-vectorizer-workspace sub-phase 3) so per-ISA
# selection still works through the umbrella default-features set.
simd = ["vectorizer-core/simd"]
# Per-ISA opt-outs. Each backend module is gated by both
# `cfg(target_arch)` AND the matching feature, so disabling a feature
# on a build that wouldn't use it is a no-op (no extra binary cost).
simd-avx2 = ["vectorizer-core/simd-avx2"]
simd-avx512 = ["vectorizer-core/simd-avx512"]
simd-neon = ["vectorizer-core/simd-neon"]
simd-sve = ["vectorizer-core/simd-sve"]
simd-wasm = ["vectorizer-core/simd-wasm"]

# OpenSSL vendored for musl cross-compilation
vendored-openssl = ["dep:openssl"]

# GPU acceleration via external hive-gpu crate only (Metal-only currently)
# Future: CUDA, ROCm, WebGPU support when hive-gpu implements them
hive-gpu = ["dep:hive-gpu"]

# Legacy features (deprecated - kept for backward compatibility)
metal-native = ["hive-gpu"]
gpu-accel = ["hive-gpu"]

# Server-to-Server (S2S) tests - only compile when explicitly enabled
# Usage: cargo test --features s2s-tests --test grpc_s2s
s2s-tests = []
benchmarks = []
candle-core = ["dep:candle-core"]
candle-nn = ["dep:candle-nn"]
candle-transformers = ["dep:candle-transformers"]
tokenizers = ["dep:tokenizers"]
hf-hub = ["dep:hf-hub"]
ort = ["dep:ort"]
arrow = ["dep:arrow"]
parquet = ["dep:parquet", "arrow"]
onnx-models = [
    "ort",
    "tokenizers",
    "hf-hub"
]
candle-models = [
    "candle-core",
    "candle-nn",
    "candle-transformers",
    "tokenizers",
    "hf-hub",
    # Activates the matching feature in vectorizer-core so the
    # `VectorizerError::CandleError(#[from] candle_core::Error)` enum
    # variant is available end-to-end.
    "vectorizer-core/candle-models"
]

# Real BERT and MiniLM embeddings (requires candle)
real-models = ["candle-models"]
transmutation = ["dep:transmutation"]
full = ["real-models", "onnx-models", "arrow", "parquet", "transmutation"]

# Unix-specific dependencies (for signal handling)
[target.'cfg(unix)'.dependencies]
nix = { version = "0.31", features = ["signal"] }

