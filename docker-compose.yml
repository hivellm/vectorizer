version: "3.8"

services:
  vectorizer:
    image: hivehub/vectorizer:latest
    container_name: vectorizer
    ports:
      # RPC (binary, recommended primary). Length-prefixed MessagePack
      # over raw TCP — 10x lower per-frame overhead than REST/JSON.
      # See docs/specs/VECTORIZER_RPC.md and docs/deployment/rpc.md.
      - "15503:15503" # VectorizerRPC
      - "15002:15002" # REST + MCP (dashboard, ops, browser clients)
      - "15003:15003" # Additional port

    volumes:
      # Persistent data
      - ./data:/vectorizer/data
      - ./../../:/workspace:ro

      # Workspace configuration for Docker (paths are /workspace/*)
      # For local dev, use workspace.yml with relative paths
      - ./workspace.docker.yml:/vectorizer/workspace.yml:ro

      # Mount parent directories for monorepo access
      # Adjust the number of ../ based on your folder structure
      # HiveLLM structure: vectorizer is in hivellm/vectorizer
      # CMMV structure: cmmv projects are in ../cmmv/
      - ../../:/workspace:ro

    environment:
      - VECTORIZER_HOST=0.0.0.0
      - VECTORIZER_PORT=15002
      - TZ=America/Sao_Paulo
      - RUN_MODE=production
      # Authentication (enabled by default with admin credentials)
      # SECURITY: Change these credentials in production!
      - VECTORIZER_AUTH_ENABLED=true
      - VECTORIZER_ADMIN_USERNAME=admin
      - VECTORIZER_ADMIN_PASSWORD=admin
      - VECTORIZER_JWT_SECRET=change-this-secret-in-production

    restart: unless-stopped

    # Healthcheck stays on REST /health because RPC needs raw TCP +
    # the length-prefixed MessagePack handshake to confirm liveness;
    # the distroless runtime doesn't ship `nc` or a MessagePack client.
    # Both transports run inside the same server process, so a passing
    # REST healthcheck implies the RPC listener is also up (or bind
    # failure surfaces in the container logs at startup).
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:15002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Resource limits (optional, adjust as needed)
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "2.0"
          memory: 2G
