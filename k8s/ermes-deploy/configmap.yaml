apiVersion: v1
kind: ConfigMap
metadata:
  name: vectorizer-config
  namespace: ermes
data:
  config-template.yml: |
    server:
      host: "0.0.0.0"
      port: 15002
      mcp_port: 15002

    file_watcher:
      enabled: false

    logging:
      level: "info"
      format: "json"
      log_requests: true
      log_responses: false
      log_errors: true
      correlation_id_enabled: true

    gpu:
      enabled: false
      batch_size: 1000
      fallback_to_cpu: true
      preferred_backend: "auto"

    monitoring:
      prometheus:
        enabled: true
        endpoint: "/prometheus/metrics"
      system_metrics:
        enabled: true
        interval_secs: 15
      telemetry:
        enabled: false
      metrics:
        search_enabled: true
        indexing_enabled: true
        replication_enabled: true
        system_enabled: true

    performance:
      cpu:
        max_threads: 8
        enable_simd: true
        memory_pool_size_mb: 1024
      batch:
        default_size: 100
        max_size: 1000
        parallel_processing: true

    storage:
      mmap:
        enabled: true
        default_for_new_collections: true
      wal:
        enabled: true
        checkpoint_interval: 1000

    auth:
      enabled: true
      jwt_secret: "placeholder-overridden-by-env-VECTORIZER_JWT_SECRET"
      jwt_expiration: 3600
      api_key_length: 32
      rate_limit_per_minute: 100
      rate_limit_per_hour: 1000

    cluster:
      enabled: true
      node_id: "__NODE_ID__"
      discovery: "dns"
      dns_name: "ermes-vectorizer-headless.ermes.svc.cluster.local"
      dns_resolve_interval: 30
      dns_grpc_port: 15003
      timeout_ms: 5000
      retry_count: 3
      servers:
        - id: "ermes-vectorizer-0"
          address: "ermes-vectorizer-0.ermes-vectorizer-headless.ermes.svc.cluster.local"
          grpc_port: 15003
        - id: "ermes-vectorizer-1"
          address: "ermes-vectorizer-1.ermes-vectorizer-headless.ermes.svc.cluster.local"
          grpc_port: 15003
        - id: "ermes-vectorizer-2"
          address: "ermes-vectorizer-2.ermes-vectorizer-headless.ermes.svc.cluster.local"
          grpc_port: 15003
      memory:
        max_cache_memory_bytes: 1073741824
        enforce_mmap_storage: true
        disable_file_watcher: true
        cache_warning_threshold: 80
        strict_validation: true

    replication:
      enabled: true
      bind_address: "0.0.0.0:7001"
      heartbeat_interval_secs: 5
      replica_timeout_secs: 30
      log_size: 1000000
      reconnect_interval_secs: 5

    api:
      rest:
        enabled: true
        cors_enabled: true
        max_request_size_mb: 10
        timeout_seconds: 30
      mcp:
        enabled: true
        port: 15002
        max_connections: 100
      grpc:
        enabled: true
        port: 15003
