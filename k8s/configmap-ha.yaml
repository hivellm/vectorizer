apiVersion: v1
kind: ConfigMap
metadata:
  name: vectorizer-ha-config
  namespace: ermes
data:
  config-template.yml: |
    server:
      host: "0.0.0.0"
      port: 15002
      mcp_port: 15002

    # MUST be disabled in cluster mode
    file_watcher:
      enabled: false

    logging:
      level: "info"
      format: "json"
      log_requests: true
      log_responses: false
      log_errors: true
      correlation_id_enabled: true

    auth:
      enabled: true

    # Cluster mode with Raft consensus for automatic failover
    cluster:
      enabled: true
      # __NODE_ID__ is replaced by the init container with the pod hostname
      node_id: "__NODE_ID__"
      discovery: "dns"
      dns_name: "ermes-vectorizer-headless.ermes.svc.cluster.local"
      dns_resolve_interval: 30
      dns_grpc_port: 15003
      timeout_ms: 5000
      retry_count: 3
      servers:
        - id: "ermes-vectorizer-0"
          address: "ermes-vectorizer-0.ermes-vectorizer-headless.ermes.svc.cluster.local"
          grpc_port: 15003
        - id: "ermes-vectorizer-1"
          address: "ermes-vectorizer-1.ermes-vectorizer-headless.ermes.svc.cluster.local"
          grpc_port: 15003
        - id: "ermes-vectorizer-2"
          address: "ermes-vectorizer-2.ermes-vectorizer-headless.ermes.svc.cluster.local"
          grpc_port: 15003
      memory:
        max_cache_memory_bytes: 1073741824  # 1GB
        enforce_mmap_storage: true
        disable_file_watcher: true
        cache_warning_threshold: 80
        strict_validation: true

    # Replication is managed automatically by Raft - no fixed role needed
    replication:
      enabled: true
      # role is set automatically by HaManager based on Raft election
      bind_address: "0.0.0.0:7001"
      heartbeat_interval_secs: 5
      replica_timeout_secs: 30
      log_size: 1000000
      reconnect_interval_secs: 5

    api:
      grpc:
        enabled: true
        port: 15003
