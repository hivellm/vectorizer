apiVersion: v1
kind: Service
metadata:
  name: vectorizer
  namespace: vectorizer
  labels:
    app: vectorizer
spec:
  type: ClusterIP
  ports:
    # RPC (binary, recommended primary) listed first per
    # phase6_make-rpc-default-transport.
    - name: rpc
      port: 15503
      targetPort: rpc
      protocol: TCP
    - name: http
      port: 15002
      targetPort: http
      protocol: TCP
    - name: replication
      port: 7001
      targetPort: replication
      protocol: TCP
  selector:
    app: vectorizer

---
# LoadBalancer Service (optional). Both RPC and REST exposed; clients
# pick by port name.
apiVersion: v1
kind: Service
metadata:
  name: vectorizer-lb
  namespace: vectorizer
  labels:
    app: vectorizer
spec:
  type: LoadBalancer
  ports:
    - name: rpc
      port: 15503
      targetPort: rpc
      protocol: TCP
    - name: http
      port: 15002
      targetPort: http
      protocol: TCP
  selector:
    app: vectorizer

