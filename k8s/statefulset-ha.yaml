apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ermes-vectorizer
  namespace: ermes
  labels:
    app: ermes-vectorizer
spec:
  serviceName: ermes-vectorizer-headless
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: ermes-vectorizer
  template:
    metadata:
      labels:
        app: ermes-vectorizer
    spec:
      initContainers:
        # Injects the pod hostname as node_id into the config
        - name: config-selector
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "Setting node_id to $HOSTNAME"
              sed "s/__NODE_ID__/$HOSTNAME/g" /configs/config-template.yml > /active-config/config.yml
              cat /active-config/config.yml
          volumeMounts:
            - name: config-templates
              mountPath: /configs
            - name: active-config
              mountPath: /active-config
      containers:
        - name: vectorizer
          image: ghcr.io/hivellm/vectorizer:latest
          imagePullPolicy: Always
          ports:
            # RPC (binary, recommended primary) listed first per
            # phase6_make-rpc-default-transport.
            - name: rpc
              containerPort: 15503
              protocol: TCP
            - name: http
              containerPort: 15002
              protocol: TCP
            - name: replication
              containerPort: 7001
              protocol: TCP
            - name: grpc
              containerPort: 15003
              protocol: TCP
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: VECTORIZER_SERVICE_NAME
              value: "ermes-vectorizer-headless.ermes.svc.cluster.local"
            - name: VECTORIZER_AUTH_ENABLED
              value: "true"
            - name: VECTORIZER_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ermes-vectorizer-credentials
                  key: VECTORIZER_USERNAME
            - name: VECTORIZER_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ermes-vectorizer-credentials
                  key: VECTORIZER_PASSWORD
            - name: VECTORIZER_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ermes-vectorizer-credentials
                  key: VECTORIZER_API_KEY
          volumeMounts:
            - name: data
              mountPath: /data
            - name: active-config
              mountPath: /vectorizer/config.yml
              subPath: config.yml
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      securityContext:
        runAsUser: 0
      volumes:
        - name: config-templates
          configMap:
            name: vectorizer-ha-config
        - name: active-config
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app: ermes-vectorizer
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Gi
