# Cross.toml - Configuration for cross-rs
# https://github.com/cross-rs/cross

[build.env]
passthrough = [
    "RUST_BACKTRACE",
    "CARGO_INCREMENTAL",
]

[target.x86_64-unknown-linux-musl]
# Custom image extending cross musl base with protoc for proto compilation
dockerfile = "./docker/Dockerfile.x86_64-unknown-linux-musl"

[target.x86_64-unknown-linux-musl.env]
passthrough = [
    "OPENSSL_STATIC=1",
    "ORT_STRATEGY=system",
    "ORT_USE_CUDA=0",
    # OPENSSL_DIR / OPENSSL_NO_VENDOR are intentionally NOT in this
    # list -- the workflow `unset`s them right before invoking
    # `cross build`, so they should never reach the container. Setting
    # them to empty (which is what `passthrough = ["OPENSSL_DIR="]`
    # does) is worse than not forwarding: openssl-sys treats empty as
    # a user-supplied path and tries to open `<empty>/include`,
    # panicking before the vendored-openssl fallback can run.
]

[target.aarch64-unknown-linux-musl]
# Custom image extending cross musl base with protoc for proto compilation
dockerfile = "./docker/Dockerfile.aarch64-unknown-linux-musl"

[target.aarch64-unknown-linux-musl.env]
passthrough = [
    "OPENSSL_STATIC=1",
    "ORT_STRATEGY=system",
    "ORT_USE_CUDA=0",
    # OPENSSL_DIR / OPENSSL_NO_VENDOR are intentionally NOT in this
    # list -- the workflow `unset`s them right before invoking
    # `cross build`, so they should never reach the container. Setting
    # them to empty (which is what `passthrough = ["OPENSSL_DIR="]`
    # does) is worse than not forwarding: openssl-sys treats empty as
    # a user-supplied path and tries to open `<empty>/include`,
    # panicking before the vendored-openssl fallback can run.
]

