# Dev mode override — applied on top of `config.example.yml` /
# `config.yml` when `VECTORIZER_MODE=dev`.
#
# Carries ONLY the keys that differ from the base for a developer
# loop on a workstation. Every other key inherits its base value.
# See `docs/deployment/configuration.md` for the merge semantics.

logging:
  # Verbose logging during development; flip back to "info" or "warn"
  # for any deployment that ships logs to a centralized aggregator.
  level: debug

server:
  # Loopback-only by default in dev; the base config already binds
  # to 127.0.0.1 so this is a redundant explicit pin for clarity.
  host: "127.0.0.1"

file_watcher:
  # File watcher on for the developer loop — re-indexes on FS events
  # so edits to a workspace file flow through to search results
  # without a manual reindex.
  enabled: true
