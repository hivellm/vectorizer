{{- if .Values.cluster.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vectorizer.fullname" . }}-headless
  labels:
    {{- include "vectorizer.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.replicationPort | default 7001 }}
      targetPort: replication
      protocol: TCP
      name: replication
  selector:
    {{- include "vectorizer.selectorLabels" . | nindent 4 }}
{{- end }}
