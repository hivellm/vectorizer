name: Rustdoc

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always
  # Treat every rustdoc warning (broken links, unclosed HTML, etc.) as an
  # error. `missing_docs` is already wired as `#![deny(...)]` in `lib.rs`
  # via phase4_enforce-public-api-docs; this flag covers the rest.
  RUSTDOCFLAGS: "-D warnings"

jobs:
  doc:
    runs-on: ubuntu-latest

    steps:
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
        with:
          key: rustdoc
      - name: Update apt
        run: sudo apt-get update
      - name: Install dependencies + system OpenSSL
        run: sudo apt-get install -y clang protobuf-compiler libssl-dev pkg-config

      - name: Override leaked Windows OPENSSL_DIR (runner env quirk)
        # The ubuntu-latest GH-hosted image currently surfaces
        # `OPENSSL_DIR=C:/Program Files/OpenSSL-Win64` to Linux jobs,
        # which makes openssl-sys panic because that path does not
        # exist on a Linux runner. Empty string also panics. Point at
        # the canonical ubuntu libssl-dev install location instead.
        run: |
          echo "OPENSSL_DIR=/usr" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/usr/include" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig" >> $GITHUB_ENV
      - name: Setup Node.js for dashboard build
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Build dashboard (required for rust-embed)
        run: |
          cd dashboard
          pnpm install --frozen-lockfile
          pnpm build
      # `cargo doc --no-deps` only checks our crate. `--all-features`
      # exercises every conditionally-compiled public item.
      - name: Build documentation
        run: cargo doc --no-deps --all-features --lib
      # Doc-tests catch broken `///` examples; cheap once the build is
      # already cached.
      - name: Run doc-tests
        run: cargo test --doc --all-features
