name: Release Helm Chart

# Helm chart publishing on release is DISABLED. It no longer runs
# automatically when a GitHub release is published; it can only be
# triggered manually from the Actions tab. To re-enable automatic
# publishing, restore the `release: types: [published]` trigger below.
on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  release-helm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set chart version from release tag
        env:
          REF_NAME: ${{ github.ref }}
        run: |
          VERSION="${REF_NAME#refs/tags/v}"
          sed -i "s/^version:.*/version: $VERSION/" helm/vectorizer/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" helm/vectorizer/Chart.yaml

      - name: Update Helm values with GHCR image
        env:
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref }}
        run: |
          sed -i "s|repository:.*|repository: ghcr.io/$REPO|" helm/vectorizer/values.yaml
          VERSION="${REF_NAME#refs/tags/v}"
          sed -i "s|tag:.*|tag: \"$VERSION\"|" helm/vectorizer/values.yaml

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: helm
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
