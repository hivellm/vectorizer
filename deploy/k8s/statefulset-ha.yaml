apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ermes-vectorizer
  namespace: ermes
  labels:
    app: ermes-vectorizer
spec:
  serviceName: ermes-vectorizer-headless
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: ermes-vectorizer
  template:
    metadata:
      labels:
        app: ermes-vectorizer
    spec:
      # Required when pulling from ghcr.io/hivellm/vectorizer (private package).
      # Create the secret with a PAT that has `read:packages`:
      #   kubectl create secret docker-registry ghcr-credentials \
      #     -n ermes --docker-server=ghcr.io \
      #     --docker-username=<gh-user> --docker-password=<pat>
      imagePullSecrets:
        - name: ghcr-credentials
      initContainers:
        # Injects the pod hostname as node_id into the config
        - name: config-selector
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "Setting node_id to $HOSTNAME"
              sed "s/__NODE_ID__/$HOSTNAME/g" /configs/config-template.yml > /active-config/config.yml
              cat /active-config/config.yml
          volumeMounts:
            - name: config-templates
              mountPath: /configs
            - name: active-config
              mountPath: /active-config
      containers:
        - name: vectorizer
          # Pin to an exact tag so rolling restarts are reproducible.
          # GHCR tags are *unprefixed*: use `3.0.11`, NOT `v3.0.11`.
          # See docs/deployment/HA_KUBERNETES_RUNBOOK.md.
          image: ghcr.io/hivellm/vectorizer:3.0.11
          imagePullPolicy: IfNotPresent
          ports:
            # RPC (binary, recommended primary) listed first per
            # phase6_make-rpc-default-transport.
            - name: rpc
              containerPort: 15503
              protocol: TCP
            - name: http
              containerPort: 15002
              protocol: TCP
            - name: replication
              containerPort: 7001
              protocol: TCP
            - name: grpc
              containerPort: 15003
              protocol: TCP
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: VECTORIZER_SERVICE_NAME
              value: "ermes-vectorizer-headless.ermes.svc.cluster.local"
            # Pin the data directory to the mounted PVC. Without this, the
            # server falls back to the per-OS user data dir
            # (`~/.local/share/vectorizer/` on Linux), which does NOT live
            # on the PVC — so every pod restart looks like a "first time
            # setup" even when `vectorizer.vecdb` is sitting unread on
            # the PVC. Live test on ermes prod hit this trap on v3.0.11.
            # See docs/deployment/HA_KUBERNETES_RUNBOOK.md (Data dir).
            - name: VECTORIZER_DATA_DIR
              value: "/data/data"
            - name: VECTORIZER_AUTH_ENABLED
              value: "true"
            - name: VECTORIZER_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ermes-vectorizer-credentials
                  key: VECTORIZER_USERNAME
            - name: VECTORIZER_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ermes-vectorizer-credentials
                  key: VECTORIZER_PASSWORD
            - name: VECTORIZER_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ermes-vectorizer-credentials
                  key: VECTORIZER_API_KEY
          volumeMounts:
            - name: data
              mountPath: /data
            - name: active-config
              mountPath: /vectorizer/config.yml
              subPath: config.yml
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          livenessProbe:
            httpGet:
              # `/health` is intentionally anonymous; `/api/status` requires a
              # JWT and would deadlock the readiness gate.
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              # `/health` is intentionally anonymous; `/api/status` requires a
              # JWT and would deadlock the readiness gate.
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      securityContext:
        runAsUser: 0
      volumes:
        - name: config-templates
          configMap:
            name: vectorizer-ha-config
        - name: active-config
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app: ermes-vectorizer
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Gi
