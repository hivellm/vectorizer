apiVersion: v1
kind: Service
metadata:
  name: {{ include "vectorizer.fullname" . }}
  labels:
    {{- include "vectorizer.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    # RPC (binary, recommended primary) listed first per
    # phase6_make-rpc-default-transport. Clients targeting this Service
    # by name resolve to the RPC port unless they specify port: http.
    - port: {{ .Values.service.rpcPort }}
      targetPort: rpc
      protocol: TCP
      name: rpc
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.replicationPort }}
      targetPort: replication
      protocol: TCP
      name: replication
  selector:
    {{- include "vectorizer.selectorLabels" . | nindent 4 }}

